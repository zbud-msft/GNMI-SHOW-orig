trigger:
  branches:
    include:
    - master

pr:
  branches:
    include:
    - master

stages:
- stage: Build
  jobs:
  - job: BuildAndTest
    displayName: "Build Wheel & Test CLI"
    timeoutInMinutes: 15

    pool:
      vmImage: ubuntu-22.04

    steps:
    - checkout: self
      clean: true
      submodules: recursive
      displayName: 'Checkout code (with submodules)'

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.10'
      displayName: 'Use Python 3.10'

    - script: |
        set -euo pipefail
        make gnmi_show
      displayName: 'Build wheel'

    - script: |
        set -euo pipefail
        pip install .build/gnmi_show-*.whl
        pip install pytest
      displayName: 'Install wheel and test deps'

    - script: |
        set -euo pipefail
        python -m pytest tests/ -v --junit-xml=test-results/results.xml
      displayName: 'Run tests'

    - task: PublishTestResults@2
      displayName: 'Publish test results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'test-results/results.xml'
        failTaskOnFailedTests: true
        testRunTitle: 'show_cli tests'
